# cargo-deny configuration for pg_brakes.
#
# ===========================================================================
#  AGPL GUARD (license hygiene — SPEC §4): this file is the deterministic gate
#  that keeps copyleft out of the dependency tree. Only permissive licenses
#  (Apache-2.0 / MIT / BSD / ISC, plus the Unicode license used by some deps)
#  are allowed. ANY GPL / AGPL / LGPL dependency causes `cargo deny check` to
#  FAIL, by design — we ship Apache-2.0 and must never link copyleft, and the
#  pgDog clean-room rule (AGPL) means we never copy that code either.
# ===========================================================================

[graph]
all-features = true

[licenses]
# Allow-list only. Anything not listed here (e.g. GPL-3.0, AGPL-3.0, LGPL-3.0)
# is rejected, which makes `cargo deny check licenses` fail closed.
allow = [
    "Apache-2.0",
    # Apache-2.0 plus the LLVM exception — strictly MORE permissive than plain
    # Apache-2.0 (it removes a linking/attribution restriction); it is the
    # license of LLVM and the Rust toolchain itself, and is NOT copyleft. Pulled
    # in transitively by `ar_archive_writer` (build-dep of `psm`/`stacker`),
    # which provides sqlparser's recursive stack-overflow protection — a
    # security control we keep for parsing hostile SQL (crates/pgwire #20).
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    # Unicode-* are permissive and required by some transitive deps
    # (e.g. unicode-ident); they are NOT copyleft.
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # NCSA (University of Illinois/NCSA Open Source License) — a permissive,
    # OSI-approved, BSD/MIT-style license (NOT copyleft). It enters ONLY via the
    # fuzz toolchain: `libfuzzer-sys` is `(MIT OR Apache-2.0) AND NCSA` because
    # it bundles the LLVM libFuzzer runtime. The fuzz crate is its own workspace
    # and never ships in the production tree, but we keep the allowance so a
    # `cargo deny check` run against the fuzz crate is also green. See fuzz/.
    "NCSA",
]
# Require a high confidence match when inferring a license from text.
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate; deny external wildcard deps.
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace `path = "..."` deps legitimately carry no version req; exempt
# them so the wildcard ban only catches risky *external* unpinned deps.
allow-wildcard-paths = true
# No banned crates yet; add copyleft-leaning or risky crates here as needed.
deny = []

[advisories]
# RUSTSEC advisory database checks (the `cargo-audit` equivalent — SPEC §4).
# `cargo deny check advisories` pulls the RustSec advisory-db and FAILS the
# build on any security vulnerability (RUSTSEC-YYYY-NNNN) in the dependency tree,
# and on yanked crates, so a newly-disclosed CVE surfaces in CI on the next run
# rather than in production. cargo-deny's defaults (vulnerabilities = error,
# unmaintained = warn) apply; we keep them.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Documented, time-boxed exceptions ONLY. Every entry must cite the RUSTSEC id
# and a reason/issue; empty by design so a fresh advisory cannot be silently
# suppressed. Example: ignore = ["RUSTSEC-2024-XXXX"] # why + tracking issue.
ignore = []

[sources]
# Only crates.io (and any explicitly allowed git/registry sources) are permitted.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
